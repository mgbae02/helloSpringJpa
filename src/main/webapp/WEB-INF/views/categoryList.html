<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>카테고리 목록</title>
    <style>
      body {
        font-family: 'Malgun Gothic', sans-serif;
        max-width: 800px;
        margin: 30px auto;
        padding: 20px;
      }
      h1 {
        color: #333;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        padding: 12px;
        border: 1px solid #ddd;
        text-align: left;
      }
      th {
        background: #f5f5f5;
      }
      .btn {
        padding: 8px 16px;
        background: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .btn-danger {
        background: #f44336;
      }
      .alert {
        padding: 12px;
        margin: 15px 0;
        border-radius: 4px;
      }
      .alert-success {
        background: #d4edda;
        color: #155724;
      }
      .alert-error {
        background: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <h1>📂 카테고리 목록</h1>

    <!-- Flash 메시지 (등록/삭제 성공/실패) -->
    <div
      th:if="${successMessage}"
      class="alert alert-success"
      th:text="${successMessage}"
    ></div>
    <div
      th:if="${errorMessage}"
      class="alert alert-error"
      th:text="${errorMessage}"
    ></div>

    <p>
      <a href="/categories/create" class="btn">+ 새 카테고리 등록</a>
      <a href="/products" class="btn" style="background: #2196f3"
        >상품 목록으로</a
      >
    </p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>카테고리명</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="cat : ${categories}">
          <td th:text="${cat.id}"></td>
          <td th:text="${cat.name}"></td>
          <td>
            <form
              th:action="@{/categories/{id}/delete(id=${cat.id})}"
              method="post"
              style="display: inline"
            >
              <button
                type="submit"
                class="btn btn-danger"
                onclick="return confirm('정말 삭제하시겠습니까?');"
              >
                삭제
              </button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
          <td colspan="3" style="text-align: center; color: #999">
            등록된 카테고리가 없습니다.
          </td>
        </tr>
      </tbody>
    </table>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>
